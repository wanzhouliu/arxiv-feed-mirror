name: Fetch arXiv cs.CV daily feed

on:
  schedule:
    # 5:30 UTC = EDT 1:30 AM / EST 0:30 AM
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch today's feed
        run: |
          mkdir -p feed
          DATE=$(date -u +%F)
          python3 fetch_arxiv.py > "feed/${DATE}.json"
          echo "Generated feed/${DATE}.json, size: $(wc -c < feed/${DATE}.json) bytes"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "feed $(date -u +%F)"
          git push
